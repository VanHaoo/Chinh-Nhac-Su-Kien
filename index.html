<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎵 Bảng Điều Khiển Nhạc Sự Kiện</title>
<style>
  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --card: #0f3460;
    --card-idle: #1e2a45;
    --card-playing: #0a3d2e;
    --card-paused: #3d2e0a;
    --accent: #e94560;
    --green: #00d68f;
    --yellow: #ffb800;
    --text: #eaeaea;
    --muted: #8892a4;
    --border: #2a3a5c;
    --btn-h: 44px;
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 12px;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px;
    margin-bottom: 12px;
  }

  .header-title {
    font-size: 1.25rem;
    font-weight: 700;
    letter-spacing: .5px;
    color: #fff;
  }
  .header-title span { color: var(--accent); }

  .header-controls {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .master-vol {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: .82rem;
    color: var(--muted);
  }
  .master-vol input[type=range] { width: 110px; }

  .btn {
    height: var(--btn-h);
    padding: 0 16px;
    border: none;
    border-radius: 8px;
    font-size: .88rem;
    font-weight: 600;
    cursor: pointer;
    transition: filter .15s, transform .1s;
    white-space: nowrap;
  }
  .btn:active { transform: scale(.96); }
  .btn:hover { filter: brightness(1.15); }

  .btn-danger  { background: var(--accent); color: #fff; }
  .btn-neutral { background: var(--border); color: var(--text); }
  .btn-add     { background: #2255aa; color: #fff; }

  .grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 10px;
  }

  .card {
    background: var(--card-idle);
    border: 2px solid var(--border);
    border-radius: var(--radius);
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    transition: background .25s, border-color .25s;
    position: relative;
    min-width: 0;
    overflow: hidden;
  }
  .card.playing {
    background: var(--card-playing);
    border-color: var(--green);
  }
  .card.paused {
    background: var(--card-paused);
    border-color: var(--yellow);
  }

  .card-status {
    position: absolute;
    top: 10px;
    right: 10px;
    font-size: .68rem;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: .5px;
  }
  .card.playing  .card-status { background: var(--green); color: #000; }
  .card.paused   .card-status { background: var(--yellow); color: #000; }
  .card:not(.playing):not(.paused) .card-status { background: var(--border); color: var(--muted); }

  .card-header {
    display: flex;
    align-items: center;
    gap: 6px;
    padding-right: 56px;
  }
  .slot-num {
    font-size: .72rem;
    font-weight: 700;
    background: var(--border);
    color: var(--muted);
    border-radius: 5px;
    padding: 2px 6px;
    flex-shrink: 0;
  }
  .card-name {
    font-size: .9rem;
    font-weight: 600;
    background: transparent;
    border: none;
    border-bottom: 1px dashed var(--border);
    color: var(--text);
    flex: 1;
    min-width: 0;
    padding: 2px 4px;
    outline: none;
  }
  .card-name:focus { border-bottom-color: var(--accent); }

  .file-row {
    display: flex;
    align-items: center;
    gap: 6px;
    min-width: 0;
    overflow: hidden;
  }

  .file-name {
    font-size: .75rem;
    color: var(--muted);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
    min-width: 0;
  }

  .transport {
    display: flex;
    gap: 6px;
  }
  .btn-play  { background: var(--green);  color: #000; flex: 2; font-size: 1rem; }
  .btn-stop  { background: #cc3355; color: #fff; flex: 1; font-size: 1rem; }
  .transport .btn {
    height: 40px;
    padding: 0;
    border-radius: 8px;
    font-weight: 700;
  }

  .seek-row, .vol-row {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: .72rem;
    color: var(--muted);
  }
  .seek-row input[type=range],
  .vol-row  input[type=range] {
    flex: 1;
    accent-color: var(--accent);
    cursor: pointer;
    height: 4px;
  }
  .time-display { min-width: 80px; text-align: right; font-size: .72rem; color: var(--muted); }

  .vol-icon { font-size: .9rem; }

  .loop-row {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: .78rem;
    color: var(--muted);
  }
  .loop-row label { cursor: pointer; display: flex; align-items: center; gap: 5px; user-select: none; }
  .loop-row input[type=checkbox] { accent-color: var(--accent); width: 15px; height: 15px; cursor: pointer; }
  .loop-row span { font-size: .75rem; }

  .bottom-bar {
    margin-top: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px;
  }

  .bottom-bar h3 {
    font-size: .88rem;
    color: var(--muted);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  #history-list {
    list-style: none;
    max-height: 140px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  #history-list li {
    font-size: .78rem;
    color: var(--muted);
    padding: 4px 8px;
    background: var(--card-idle);
    border-radius: 5px;
    display: flex;
    justify-content: space-between;
    gap: 8px;
  }
  #history-list li .h-name { color: var(--text); }
  #history-list li .h-time { flex-shrink: 0; }
  #history-list:empty::after {
    content: 'Chưa có lịch sử phát nhạc.';
    font-size: .78rem;
    color: var(--border);
    padding: 4px 8px;
    display: block;
  }

  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  input[type=range] {
    -webkit-appearance: none;
    appearance: none;
    background: var(--border);
    border-radius: 3px;
    height: 5px;
    outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    background: var(--accent);
    border-radius: 50%;
    cursor: pointer;
  }

  @media (max-width: 1100px) { .grid { grid-template-columns: repeat(3,minmax(0,1fr)); } }
  @media (max-width: 780px)  { .grid { grid-template-columns: repeat(2,minmax(0,1fr)); } }
  @media (max-width: 480px)  { .grid { grid-template-columns: 1fr; } }

  .shortcut-hint {
    font-size: .68rem;
    color: var(--border);
    text-align: right;
    margin-top: 2px;
  }

  .error-box {
    background: #3d0a0a;
    border: 1px solid #cc3355;
    color: #fff;
    padding: 12px;
    border-radius: var(--radius);
    margin-bottom: 12px;
    display: none;
  }

  code {
    white-space: pre-wrap;
    color: #fff;
  }
</style>
</head>
<body>

<header>
  <div class="header-title">🎵 <span>Bảng Điều Khiển</span> Nhạc Sự Kiện</div>
  <div class="header-controls">
    <div class="master-vol">
      🔊 Master
      <input type="range" id="masterVol" min="0" max="1" step="0.01" value="1">
      <span id="masterVolDisplay">100%</span>
    </div>
    <button class="btn btn-danger" onclick="stopAll()">⏹ Dừng Tất Cả</button>
    <button class="btn btn-add" onclick="reloadSongs()">↻ Tải lại songs.json</button>
  </div>
</header>

<div class="error-box" id="errorBox"></div>

<div class="grid" id="grid"></div>

<div class="bottom-bar">
  <h3>
    📋 Lịch sử phát nhạc
    <button class="btn btn-neutral" style="height:30px;padding:0 12px;font-size:.78rem;" onclick="clearHistory()">Xóa lịch sử</button>
  </h3>
  <ul id="history-list"></ul>
</div>

<script>
let masterVolume = 1;
let songs = [];
const cards = {};
const HISTORY_KEY = 'event_music_history';

const masterInput = document.getElementById('masterVol');
const masterDisplay = document.getElementById('masterVolDisplay');

masterInput.addEventListener('input', () => {
  masterVolume = parseFloat(masterInput.value);
  masterDisplay.textContent = Math.round(masterVolume * 100) + '%';

  Object.values(cards).forEach(c => {
    if (c.audio) c.audio.volume = c.localVol * masterVolume;
  });
});

async function loadSongsFromJson() {
  const errorBox = document.getElementById('errorBox');
  errorBox.style.display = 'none';
  errorBox.textContent = '';

  try {
    const res = await fetch('songs.json?time=' + Date.now());

    if (!res.ok) {
      throw new Error('Không tìm thấy file songs.json');
    }

    songs = await res.json();

    if (!Array.isArray(songs)) {
      throw new Error('songs.json phải là dạng mảng []');
    }

    renderCardsFromSongs();
    renderHistory();
  } catch (err) {
    document.getElementById('grid').innerHTML = '';
    errorBox.style.display = 'block';
    errorBox.innerHTML = `
      <b>Lỗi đọc songs.json:</b> ${escapeHtml(err.message)}<br><br>
      Nếu đang mở bằng file:// thì hãy mở bằng Live Server hoặc GitHub Pages.<br><br>
      Ví dụ songs.json đúng:<br>
      <code>[
  {"name":"Nhạc mở màn","file":"music/mo-man.mp3"},
  {"name":"Nhạc trò chơi","file":"music/tro-choi.mp3"}
]</code>
    `;
  }
}

function reloadSongs() {
  stopAll();
  loadSongsFromJson();
}

function renderCardsFromSongs() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  Object.keys(cards).forEach(id => {
    if (cards[id].audio) {
      cards[id].audio.pause();
      cards[id].audio.src = '';
    }
    delete cards[id];
  });

  songs.forEach((song, index) => {
    addCard(song, index + 1);
  });
}

function addCard(song, id) {
  const audio = new Audio(song.file);

  cards[id] = {
    audio,
    localVol: typeof song.volume === 'number' ? song.volume : 0.8,
    fileName: song.file,
    name: song.name || `Ô Nhạc ${id}`,
    isSeeking: false
  };

  audio.volume = cards[id].localVol * masterVolume;
  audio.loop = !!song.loop;

  const div = document.createElement('div');
  div.className = 'card';
  div.id = `card-${id}`;

  div.innerHTML = `
    <div class="card-header">
      <span class="slot-num">${id}</span>
      <input class="card-name" type="text" value="${escapeHtml(cards[id].name)}" title="Nhấn để đổi tên hiển thị" />
    </div>
    <span class="card-status">Sẵn sàng</span>

    <div class="file-row">
      <span class="file-name" id="fname-${id}">${escapeHtml(song.file)}</span>
    </div>

    <div class="transport">
      <button class="btn btn-play" id="playPause-${id}" onclick="togglePlayPause(${id})" title="Play/Pause [phím ${id}]">▶</button>
      <button class="btn btn-stop" onclick="stopCard(${id})" title="Dừng">⏹</button>
    </div>

    <div class="seek-row">
      ⏱
      <input type="range" id="seek-${id}" min="0" max="100" step="0.1" value="0"
             oninput="seeking(${id})" onchange="seekTo(${id})">
      <span class="time-display" id="time-${id}">0:00 / 0:00</span>
    </div>

    <div class="vol-row">
      <span class="vol-icon">🔉</span>
      <input type="range" id="vol-${id}" min="0" max="1" step="0.01" value="${cards[id].localVol}"
             oninput="setVol(${id})">
      <span id="vdisp-${id}">${Math.round(cards[id].localVol * 100)}%</span>
    </div>

    <div class="loop-row">
      <label>
        <input type="checkbox" id="loop-${id}" onchange="setLoop(${id})" ${audio.loop ? 'checked' : ''}>
        <span>🔁 Lặp lại</span>
      </label>
    </div>
    <div class="shortcut-hint">Phím tắt: ${id <= 9 ? id : '—'}</div>
  `;

  document.getElementById('grid').appendChild(div);

  audio.addEventListener('timeupdate', () => updateSeek(id));
  audio.addEventListener('loadedmetadata', () => updateSeek(id));
  audio.addEventListener('play', () => {
    setCardState(id, 'playing');
    setPlayPauseIcon(id, 'pause');
  });
  audio.addEventListener('pause', () => {
    if (audio.currentTime > 0 && audio.currentTime < audio.duration) {
      setCardState(id, 'paused');
      setPlayPauseIcon(id, 'play');
    }
  });
  audio.addEventListener('ended', () => {
    if (!audio.loop) {
      setCardState(id, 'idle');
      setPlayPauseIcon(id, 'play');
    }
  });
  audio.addEventListener('error', () => {
    setCardState(id, 'error');
    setPlayPauseIcon(id, 'play');
  });
}

function togglePlayPause(id) {
  const c = cards[id];
  if (!c || !c.audio) return;

  if (c.audio.paused) {
    playCard(id);
  } else {
    pauseCard(id);
  }
}

function playCard(id) {
  const c = cards[id];
  if (!c || !c.audio) return;

  c.audio.volume = c.localVol * masterVolume;

  c.audio.play()
    .then(() => {
      setCardState(id, 'playing');
      setPlayPauseIcon(id, 'pause');
      logHistory(id, 'start');
    })
    .catch(() => {
      alert('Không phát được file. Kiểm tra lại đường dẫn trong songs.json hoặc tên file trong thư mục music/.');
      setCardState(id, 'error');
      setPlayPauseIcon(id, 'play');
    });
}

function pauseCard(id) {
  const c = cards[id];
  if (!c || !c.audio) return;

  c.audio.pause();
  setCardState(id, 'paused');
  setPlayPauseIcon(id, 'play');
}

function stopCard(id) {
  const c = cards[id];
  if (!c || !c.audio) return;

  c.audio.pause();
  c.audio.currentTime = 0;
  setCardState(id, 'idle');
  setPlayPauseIcon(id, 'play');

  const seek = document.getElementById(`seek-${id}`);
  if (seek) seek.value = 0;

  const time = document.getElementById(`time-${id}`);
  if (time) time.textContent = `0:00 / ${fmt(c.audio.duration || 0)}`;
}

function stopAll() {
  Object.keys(cards).forEach(id => stopCard(parseInt(id)));
}

function setPlayPauseIcon(id, mode) {
  const btn = document.getElementById(`playPause-${id}`);
  if (!btn) return;

  btn.textContent = mode === 'pause' ? '⏸' : '▶';
}

function seeking(id) {
  const c = cards[id];
  if (!c || !c.audio || !c.audio.duration) return;

  c.isSeeking = true;

  const seek = document.getElementById(`seek-${id}`);
  const time = document.getElementById(`time-${id}`);

  const previewTime = (parseFloat(seek.value) / 100) * c.audio.duration;
  time.textContent = `${fmt(previewTime)} / ${fmt(c.audio.duration)}`;
}

function seekTo(id) {
  const c = cards[id];
  if (!c || !c.audio || !c.audio.duration) {
    if (c) c.isSeeking = false;
    return;
  }

  const seek = document.getElementById(`seek-${id}`);
  c.audio.currentTime = (parseFloat(seek.value) / 100) * c.audio.duration;
  c.isSeeking = false;
}

function updateSeek(id) {
  const c = cards[id];
  if (!c || !c.audio) return;

  if (!c.isSeeking) {
    const pct = c.audio.duration ? (c.audio.currentTime / c.audio.duration) * 100 : 0;
    const seek = document.getElementById(`seek-${id}`);
    if (seek) seek.value = pct;
  }

  const time = document.getElementById(`time-${id}`);
  if (time) {
    time.textContent = `${fmt(c.audio.currentTime)} / ${fmt(c.audio.duration || 0)}`;
  }
}

function fmt(s) {
  if (!isFinite(s)) return '0:00';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return `${m}:${sec.toString().padStart(2,'0')}`;
}

function setVol(id) {
  const c = cards[id];
  if (!c) return;

  const v = parseFloat(document.getElementById(`vol-${id}`).value);
  c.localVol = v;
  document.getElementById(`vdisp-${id}`).textContent = Math.round(v * 100) + '%';

  if (c.audio) c.audio.volume = v * masterVolume;
}

function setLoop(id) {
  const c = cards[id];
  if (c && c.audio) {
    c.audio.loop = document.getElementById(`loop-${id}`).checked;
  }
}

function setCardState(id, state) {
  const card = document.getElementById(`card-${id}`);
  if (!card) return;

  const badge = card.querySelector('.card-status');
  card.classList.remove('playing','paused');

  if (state === 'playing') {
    card.classList.add('playing');
    badge.textContent = '▶ Đang phát';
  } else if (state === 'paused') {
    card.classList.add('paused');
    badge.textContent = '⏸ Tạm dừng';
  } else if (state === 'error') {
    badge.textContent = 'Lỗi file';
  } else {
    badge.textContent = '⏹ Dừng';
  }
}

function logHistory(id, type) {
  if (type !== 'start') return;

  const card = document.getElementById(`card-${id}`);
  const name = card.querySelector('.card-name').value;
  const file = cards[id].fileName || '';

  const list = getHistory();
  list.unshift({
    name,
    file,
    time: new Date().toLocaleTimeString('vi-VN')
  });

  if (list.length > 50) list.pop();

  localStorage.setItem(HISTORY_KEY, JSON.stringify(list));
  renderHistory();
}

function getHistory() {
  try {
    return JSON.parse(localStorage.getItem(HISTORY_KEY)) || [];
  } catch {
    return [];
  }
}

function renderHistory() {
  const ul = document.getElementById('history-list');
  ul.innerHTML = '';

  getHistory().forEach(h => {
    const li = document.createElement('li');
    li.innerHTML = `<span><span class="h-name">${escapeHtml(h.name)}</span> — ${escapeHtml(h.file)}</span><span class="h-time">${escapeHtml(h.time)}</span>`;
    ul.appendChild(li);
  });
}

function clearHistory() {
  if (confirm('Xóa toàn bộ lịch sử phát nhạc?')) {
    localStorage.removeItem(HISTORY_KEY);
    renderHistory();
  }
}

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;

  const n = parseInt(e.key);
  if (n >= 1 && n <= 9 && cards[n]) {
    togglePlayPause(n);
  }
});

function escapeHtml(str) {
  return String(str || '')
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#039;');
}

loadSongsFromJson();
</script>
</body>
</html>
